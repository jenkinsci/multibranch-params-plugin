# Display strings for ParameterizedBranchProperty config UI
Branch\ Parameters=Branch Parameters
description=Define parameters that will be injected into every branch build. \
  These survive branch index rescans and are manageable from the UI without \
  touching individual Jenkinsfiles.
Add\ Parameter=Add Parameter
Delete=Delete
Merge\ with\ Jenkinsfile\ parameters=Merge with Jenkinsfile parameters
mergeDescription=When checked, parameters defined here are merged with any \
  parameters() block in the Jenkinsfile. In case of a name conflict, the \
  parameters defined here take precedence. When unchecked (default), the \
  parameters defined here fully replace those from the Jenkinsfile.
