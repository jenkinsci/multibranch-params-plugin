# Display strings for ParameterizedBranchPropertyStrategy config UI
Parameterized\ Branch\ Strategy=Parameterized Branch Strategy
Branch\ filter\ mode=Branch filter mode
filterModeDescription=Controls which branches receive the configured parameters.
Branch\ name\ pattern\ (regex)=Branch name pattern (regex)
patternDescription=A Java regular expression matched against the full branch name. \
  Examples: "main|develop" matches only those two branches; \
  "feature/.*" matches all feature branches; \
  ".*" matches everything.
Add\ Parameter=Add Parameter
Delete=Delete
Merge\ with\ Jenkinsfile\ parameters=Merge with Jenkinsfile parameters
mergeDescription=When checked, parameters defined here are merged with any \
  parameters() block in the Jenkinsfile. Parameters defined here take \
  precedence on name conflict.

# FilterMode enum labels shown in the <f:select> dropdown
FilterMode.ALL=All branches
FilterMode.INCLUDE_PATTERN=Only branches matching pattern
FilterMode.EXCLUDE_PATTERN=All branches except those matching pattern
